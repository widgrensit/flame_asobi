name: flame_asobi
version: 0.1.0
description: Asobi multiplayer game backend integration for Flame. Provides components and mixins for real-time multiplayer, matchmaking, and leaderboards.
homepage: https://github.com/widgrensit/flame_asobi
repository: https://github.com/widgrensit/flame_asobi
topics:
  - flame
  - multiplayer
  - game-backend
  - matchmaking

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.36.0
  # Pinned to git until asobi-dart publishes the post-PR-#14 release that
  # drops the typed MatchInput in favour of `Map<String, dynamic>`. The
  # smoke test depends on the new sendMatchInput signature; bump back to
  # a pub.dev version (>= 0.2.0) once published.
  asobi:
    git:
      url: https://github.com/widgrensit/asobi-dart
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  flame_test: ^1.16.0
  flame_lint: ^1.1.0
  mocktail: ^1.0.0
